<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="circle-clip">
      <circle cx="256" cy="256" r="240" />
    </clipPath>
  </defs>

  <!-- 雪白背景 -->
  <circle cx="256" cy="256" r="248" fill="#F8FAFC" stroke="#1E3A8A" stroke-width="16"/>

  <g clip-path="url(#circle-clip)">
    <!-- 紅日 (Sun) -->
    <circle cx="256" cy="150" r="80" fill="#BE123C" />
    
    <!-- 富士山/雪山 (Mountain) -->
    <path d="M256 180 L 50 450 L 462 450 Z" fill="#1E293B" /> 
    
    <!-- 山頂積雪 (Snow Cap) -->
    <path d="M256 180 L 195 260 C 210 250, 230 270, 256 250 C 280 270, 300 250, 317 260 Z" fill="white"/>

    <!-- 雪花 (Snowflakes) -->
    <g transform="translate(100, 150) scale(0.6)" stroke="#93C5FD" stroke-width="12" stroke-linecap="round">
       <path d="M0 -30 L0 30 M-26 -15 L26 15 M-26 15 L26 -15"/>
    </g>
    <g transform="translate(400, 200) scale(0.4)" stroke="#93C5FD" stroke-width="15" stroke-linecap="round">
       <path d="M0 -30 L0 30 M-26 -15 L26 15 M-26 15 L26 -15"/>
    </g>
    <g transform="translate(256, 380) scale(0.3)" stroke="white" stroke-width="15" stroke-linecap="round" opacity="0.3">
       <path d="M0 -30 L0 30 M-26 -15 L26 15 M-26 15 L26 -15"/>
    </g>

    <!-- 滑雪者痕跡 (Ski Tracks) -->
    <path d="M150 450 Q 256 400, 362 450" stroke="white" stroke-width="8" stroke-dasharray="20 10" fill="none" opacity="0.5"/>
  </g>
</svg>