        const ItineraryView = ({ itinerary, selectedDay }) => {

            return (

                         {/* Snow effect */}
                         <div className="absolute top-4 left-1/2 w-1 h-1 bg-white rounded-full opacity-60"></div>
                         <div className="absolute top-10 right-1/4 w-1.5 h-1.5 bg-white rounded-full opacity-40"></div>
                         
                         <div className="relative z-10 flex justify-between items-start">
                            <div>
                                <h2 className="text-2xl font-bold tracking-tight">{dayData.location}</h2>

                    </div>

                    <div className="p-4 relative">
                        {dayData.activities.map((act, idx) => {

                                        </div>
                                        
                                        <p className="text-sm text-slate-500 mt-2 leading-relaxed whitespace-pre-line">{act.desc}</p>
                                        <div className="flex gap-2 mt-4">
                                            <a href={act.mapLink || mapLink} target="_blank" className="inline-flex items-center gap-1.5 text-xs font-bold text-blue-700 bg-blue-50 px-3 py-2 rounded-lg hover:bg-blue-100 transition-colors">
                                                <Icons.MapIcon size={14}/> Google Maps
                                            </a>
                                            {act.type === '交通' && act.title.includes('新幹線') && (
                                                <a href={SHINKANSEN_LINK} target="_blank" className="inline-flex items-center gap-1.5 text-xs font-bold text-emerald-700 bg-emerald-50 px-3 py-2 rounded-lg hover:bg-emerald-100 transition-colors">
                                                    <Icons.CalendarDays size={14}/> 時刻表
                                                </a>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const AccountingView = ({ expenses, setExpenses, newItem, setNewItem, showAddExpense, setShowAddExpense, exchangeRate }) => {
            const totalJPY = expenses.reduce((sum, item) => sum + Number(item.amount), 0);
            const grouped = expenses.reduce((acc, item) => {
                const d = item.date;
                if(!acc[d]) acc[d] = [];
                acc[d].push(item);
                return acc;
            }, {});
            const sortedDates = Object.keys(grouped).sort().reverse();

            const handleSave = () => {
                if(!newItem.title || !newItem.amount) return;
                setExpenses(prev => [{...newItem, id: Date.now(), amount: Number(newItem.amount)}, ...prev]);
                setNewItem({...newItem, title: "", amount: "", note: ""}); // 保留日期
                setShowAddExpense(false);
            };
            const handleDelete = (id) => setExpenses(prev => prev.filter(e => e.id !== id));

            return (
                <div className="pb-24 px-4 pt-2">
                     <div className="bg-white p-5 rounded-2xl shadow-soft border border-gray-100 flex justify-between items-center mb-6">
                        <div>
                            <div className="text-xs text-gray-400 font-bold uppercase tracking-wider">總支出 (JPY)</div>
                            <div className="text-3xl font-black font-mono text-slate-900 mt-1">¥ {totalJPY.toLocaleString()}</div>
                            <div className="text-xs text-gray-500 mt-1 font-medium">≈ NT$ {Math.round(totalJPY / exchangeRate).toLocaleString()}</div>
                        </div>
                        <button onClick={() => setShowAddExpense(true)} className="w-12 h-12 bg-blue-900 rounded-full flex items-center justify-center text-white shadow-lg active:scale-95 transition-all hover:bg-blue-800">
                            <Icons.Plus strokeWidth={3} size={28}/>
                        </button>
                     </div>

                     <div className="space-y-6">
                        {sortedDates.length === 0 && <div className="text-center text-gray-400 py-10">尚無消費紀錄</div>}
                        {sortedDates.map(date => (
                            <div key={date}>
                                <div className="text-xs font-bold text-gray-400 mb-2 ml-2 tracking-wide">{date}</div>
                                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                                    {grouped[date].map((exp, i) => (
                                        <div key={exp.id} className={`p-4 flex justify-between items-center ${i !== grouped[date].length - 1 ? 'border-b border-gray-50' : ''}`}>
                                            <div className="flex-1 overflow-hidden mr-4">
                                                <div className="font-bold text-slate-800 text-base truncate">{exp.title}</div>
                                                {exp.note && <div className="text-xs text-gray-400 truncate mt-0.5">{exp.note}</div>}
                                            </div>
                                            <div className="flex items-center gap-3">
                                                <span className="font-mono text-sm font-bold text-blue-700">¥{Number(exp.amount).toLocaleString()}</span>
                                                <button onClick={() => handleDelete(exp.id)} className="text-gray-300 hover:text-rose-500 p-1"><Icons.Trash2 size={16}/></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                     </div>

                     {/* Modal */}
                     {showAddExpense && (
                         <div className="fixed inset-0 bg-[#0F172A]/40 z-[60] flex items-center justify-center p-6 backdrop-blur-sm animate-in fade-in">
                             <div className="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl border border-white/50">
                                <h3 className="text-lg font-bold text-center mb-6 text-slate-900">新增支出</h3>
                                <div className="space-y-4">
                                    <input type="date" value={newItem.date} onChange={e => setNewItem(prev => ({...prev, date: e.target.value}))} className="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500"/>
                                    <input type="text" placeholder="項目名稱" value={newItem.title} onChange={e => setNewItem(prev => ({...prev, title: e.target.value}))} className="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500"/>
                                    <div>
                                        <input type="number" placeholder="金額 (日圓)" value={newItem.amount} onChange={e => setNewItem(prev => ({...prev, amount: e.target.value}))} className="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl text-lg font-mono outline-none focus:ring-2 focus:ring-blue-500"/>
                                        {newItem.amount && <div className="text-right text-xs text-gray-400 mt-1 font-mono">≈ NT$ {Math.round(Number(newItem.amount)/exchangeRate).toLocaleString()}</div>}
                                    </div>
                                    <input type="text" placeholder="備註 (選填)" value={newItem.note} onChange={e => setNewItem(prev => ({...prev, note: e.target.value}))} className="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500"/>
                                    <div className="flex gap-3 pt-2">

                         </div>
                     )}

            );
        };

        const ChecklistView = ({ checklist, setChecklist, exchangeRate, setExchangeRate }) => {
            const [input, setInput] = useState("");
            const completed = checklist.filter(i => i.checked).length;
            const progress = Math.round((completed / checklist.length) * 100) || 0;

            const add = () => {
                if(!input.trim()) return;
                setChecklist(prev => [...prev, { id: Date.now(), text: input.trim(), checked: false }]);
                setInput("");
            };
            const toggle = (id) => setChecklist(prev => prev.map(i => i.id === id ? {...i, checked: !i.checked} : i));
            const remove = (id) => setChecklist(prev => prev.filter(i => i.id !== id));

            return (
                <div className="p-4 space-y-6 pb-24">
                    {/* SOS */}
                    <div className="bg-white p-4 rounded-2xl border border-rose-100 shadow-sm flex gap-4 items-center">
                        <div className="bg-rose-50 p-3 rounded-xl"><Icons.PhoneCall className="text-rose-500"/></div>
                        <div>
                            <div className="text-sm text-rose-600 font-bold">緊急報案 110 (警) / 119 (火)</div>
                            <div className="text-xs text-gray-500 mt-0.5">駐日代表處急難救助 +81-80-1009-7179</div>
                        </div>
                    </div>

                    {/* Progress */}
                    <div className="bg-gradient-to-r from-blue-900 to-indigo-800 text-white p-6 rounded-3xl shadow-soft relative overflow-hidden">
                        <div className="relative z-10">
                            <h2 className="text-sm font-bold opacity-80 mb-1 tracking-wider">準備進度</h2>
                            <div className="text-4xl font-black mb-4">{progress}%</div>
                            <div className="w-full bg-black/20 h-3 rounded-full overflow-hidden backdrop-blur-sm">
                                <div className="bg-white h-full transition-all duration-700 ease-out" style={{width: `${progress}%`}}></div>
                            </div>
                        </div>
                        <Icons.CheckSquare className="absolute -right-4 -bottom-4 w-32 h-32 text-white opacity-10 rotate-12" />
                    </div>

                    {/* Add */}
                    <div className="flex gap-3">
                        <input type="text" value={input} onChange={e => setInput(e.target.value)} placeholder="新增待辦 (如: 護照、雪票...)" className="flex-1 bg-white border border-gray-100 shadow-sm rounded-xl px-5 text-sm focus:ring-2 focus:ring-blue-500 outline-none"/>
                        <button onClick={add} disabled={!input} className="bg-blue-900 text-white w-12 rounded-xl flex items-center justify-center shadow-lg shadow-blue-900/20 disabled:opacity-50 disabled:shadow-none hover:bg-blue-800 transition-all"><Icons.Plus/></button>
                    </div>

                    {/* List */}
                    <div className="bg-white rounded-2xl shadow-soft border border-gray-100 overflow-hidden">
                        {checklist.map(item => (
                            <div key={item.id} className="flex items-center justify-between p-4 border-b border-gray-50 last:border-0 hover:bg-gray-50 transition-colors cursor-pointer" onClick={() => toggle(item.id)}>
                                <div className="flex items-center gap-4 flex-1">
                                    <div className={`w-6 h-6 rounded-lg border-2 flex items-center justify-center transition-all duration-300 ${item.checked ? 'bg-blue-600 border-blue-600' : 'border-gray-200'}`}>
                                        {item.checked && <Icons.CheckSquare size={14} className="text-white"/>}
                                    </div>
                                    <span className={`text-base font-medium transition-all ${item.checked ? 'text-gray-300 line-through' : 'text-slate-700'}`}>{item.text}</span>
                                </div>
                                <button onClick={(e) => { e.stopPropagation(); remove(item.id); }} className="text-gray-200 hover:text-rose-400 p-2"><Icons.X size={18}/></button>
                            </div>
                        ))}
                    </div>

                    {/* Rate */}
                    <div className="text-center p-4 bg-white/50 rounded-2xl border border-dashed border-gray-200">
                        <label className="text-xs text-gray-400 font-bold uppercase mr-2">匯率設定 (1 TWD)</label>
                        <span className="text-sm font-bold text-slate-700 mr-2">≈</span>
                        <input type="number" value={exchangeRate} onChange={e => setExchangeRate(e.target.value)} className="w-16 text-center border-b-2 border-gray-200 font-mono text-sm focus:border-blue-900 outline-none bg-transparent"/>
                        <span className="text-xs text-gray-400 ml-1">JPY</span>
                    </div>
                </div>
            );
        };

        // --- Error Boundary ---
        class ErrorBoundary extends Component {
            constructor(props) { super(props); this.state = { hasError: false }; }
            static getDerivedStateFromError(error) { return { hasError: true }; }
            render() {
                if (this.state.hasError) return <div className="p-10 text-center"><h1 className="text-xl font-bold mb-4">發生錯誤</h1><button onClick={()=>{localStorage.clear(); window.location.reload();}} className="bg-red-500 text-white px-4 py-2 rounded">重設 APP</button></div>;
                return this.props.children;
            }
        }

        const App = () => {
            const [tab, setTab] = useState('itinerary');
            const [day, setDay] = useState({ day: 1, subDay: undefined });
            const [itinerary, setItinerary] = useState(INITIAL_ITINERARY);
            const [expenses, setExpenses] = useState([]);
            const [checklist, setChecklist] = useState(INITIAL_CHECKLIST);
            // 預設匯率 1 TWD = 4.6 JPY (2024-2025 概況)
            const [exchangeRate, setExchangeRate] = useState(4.6);
            const [showAddExpense, setShowAddExpense] = useState(false);
            const [newItem, setNewItem] = useState({ date: "2026-03-15", title: "", amount: "", note: "" });

            // --- Weather Fetching ---
            useEffect(() => {
                const fetchWeather = async () => {
                    try {
                        // Tokyo: 35.71, Naeba: 36.79
                        const tokyoUrl = `https://api.open-meteo.com/v1/forecast?latitude=35.71&longitude=139.77&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia%2FTokyo&start_date=2026-03-15&end_date=2026-03-23`;
                        const naebaUrl = `https://api.open-meteo.com/v1/forecast?latitude=36.79&longitude=138.78&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia%2FTokyo&start_date=2026-03-15&end_date=2026-03-23`;

                        const [tokyoRes, naebaRes] = await Promise.all([fetch(tokyoUrl), fetch(naebaUrl)]);
                        const tokyoData = await tokyoRes.json();
                        const naebaData = await naebaRes.json();

                        const weatherCodeToIcon = (code) => {
                            if (code === 0) return "☀️";
                            if (code <= 3) return "⛅";
                            if (code <= 48) return "☁️";
                            if (code <= 67) return "🌧️";
                            if (code <= 77) return "❄️";
                            if (code <= 82) return "🌧️";
                            if (code <= 86) return "❄️";
                            return "⛈️";
                        };

                        setItinerary(prev => prev.map((day, idx) => {
                            const isNaeba = day.location.includes("苗場");
                            const data = isNaeba ? naebaData : tokyoData;
                            if (data.daily) {
                                // Find the index in daily data based on date
                                const dateIdx = data.daily.time.indexOf(day.fullDate);
                                if (dateIdx !== -1) {
                                    return {
                                        ...day,
                                        weather: weatherCodeToIcon(data.daily.weathercode[dateIdx]),
                                        tempHigh: Math.round(data.daily.temperature_2m_max[dateIdx]),
                                        tempLow: Math.round(data.daily.temperature_2m_min[dateIdx]),
                                        rainProb: data.daily.precipitation_probability_max[dateIdx] || 0
                                    };
                                }
                            }
                            return day;
                        }));
                    } catch (err) {
                        console.error("Weather Fetch Error", err);
                    }
                };
                fetchWeather();
            }, []);

            useEffect(() => {
                try {
                    const localData = localStorage.getItem(STORAGE_KEY);
                    if (localData) {
                        const parsed = JSON.parse(localData);
                        if(parsed.expenses) setExpenses(parsed.expenses);
                        if(parsed.checklist) {
                            // 合併新舊清單，確保新加入的項目會出現
                            const savedIds = new Set(parsed.checklist.map(item => item.id));
                            const newItems = INITIAL_CHECKLIST.filter(item => !savedIds.has(item.id));
                            setChecklist([...parsed.checklist, ...newItems]);
                        }
                        if(parsed.exchangeRate) setExchangeRate(parsed.exchangeRate);
                    }
                } catch(e) { console.error("Load Error", e); }
            }, []);

            useEffect(() => {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify({ expenses, checklist, exchangeRate }));
                } catch(e) { console.error("Save Error", e); }
            }, [expenses, checklist, exchangeRate]);

            return (
                <div className="min-h-screen pb-safe">
                    <Header />
                    {tab === 'itinerary' && <DaySelector itinerary={itinerary} selectedDay={day} setSelectedDay={setDay} />}
                    
                    <main className="max-w-[480px] mx-auto">
                        {tab === 'itinerary' && <ItineraryView itinerary={itinerary} selectedDay={day} />}
                        {tab === 'accounting' && (
                            <AccountingView 
                                expenses={expenses} setExpenses={setExpenses} 
                                newItem={newItem} setNewItem={setNewItem}
                                showAddExpense={showAddExpense} setShowAddExpense={setShowAddExpense}
                                exchangeRate={exchangeRate}
                            />
                        )}
                        {tab === 'checklist' && (
                            <ChecklistView 
                                checklist={checklist} setChecklist={setChecklist}
                                exchangeRate={exchangeRate} setExchangeRate={setExchangeRate}
                            />
                        )}
                    </main>

                    <BottomNav activeTab={tab} setActiveTab={setTab} />
                    
                    <div className="text-center py-6 text-[10px] text-gray-300 font-mono select-none">{APP_VERSION}</div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(reg => console.log('SW Registered', reg.scope))
                    .catch(err => console.log('SW Fail', err));
            });
        }
    </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
